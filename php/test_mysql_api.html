<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MySQL API Test</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">
<style>
  body { background: #f4f6fb; }
  .result-box { font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; background: #1e293b; color: #94d82d; padding: 12px; border-radius: 6px; }
  .badge-ms { font-size: 11px; }
</style>
</head>
<body>
<div class="container-xl py-4">
  <div class="page-header mb-3">
    <div class="row align-items-center">
      <div class="col">
        <h2 class="page-title">MySQL API Test</h2>
        <div class="text-muted mt-1">Тестирование <code>mysql_api.php</code> — локальный сервер</div>
      </div>
      <div class="col-auto">
        <span id="ping-badge" class="badge bg-secondary">⏳ проверка...</span>
      </div>
    </div>
  </div>

  <!-- Быстрые тесты -->
  <div class="card mb-3">
    <div class="card-header">
      <h3 class="card-title">Быстрые тесты</h3>
      <div class="card-options">
        <button class="btn btn-sm btn-primary" onclick="runAllTests()">▶ Запустить все</button>
        <button class="btn btn-sm btn-outline-secondary ms-2" onclick="clearLog()">🗑 Очистить</button>
      </div>
    </div>
    <div class="card-body p-0">
      <table class="table table-vcenter table-sm mb-0" id="tests-table">
        <thead><tr><th>Тест</th><th>Запрос</th><th>Статус</th><th>Время</th><th>Результат</th></tr></thead>
        <tbody id="tests-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Ручной запрос -->
  <div class="card mb-3">
    <div class="card-header"><h3 class="card-title">Ручной SQL запрос</h3></div>
    <div class="card-body">
      <div class="row g-2">
        <div class="col-12">
          <textarea id="sql-input" class="form-control font-monospace" rows="3" placeholder="SELECT * FROM ..."></textarea>
        </div>
        <div class="col-auto">
          <input id="params-input" class="form-control" placeholder="params (через |)" style="width:220px">
        </div>
        <div class="col-auto">
          <select id="format-select" class="form-select" style="width:100px">
            <option value="json">json</option>
            <option value="simple">simple</option>
          </select>
        </div>
        <div class="col-auto">
          <button class="btn btn-primary" onclick="runManual()">Выполнить</button>
        </div>
      </div>
      <div class="mt-3" id="manual-result" style="display:none">
        <div class="d-flex justify-content-between mb-1">
          <small class="text-muted">Ответ</small>
          <span id="manual-time" class="badge bg-azure badge-ms"></span>
        </div>
        <div class="result-box" id="manual-output"></div>
      </div>
    </div>
  </div>

  <!-- Лог -->
  <div class="card">
    <div class="card-header"><h3 class="card-title">Лог</h3></div>
    <div class="card-body p-0">
      <div class="result-box m-2" id="log-output" style="min-height:80px; color:#7dd3fc;"></div>
    </div>
  </div>
</div>

<script>
const API = 'mysql_api.php';
const KEY = 'test_local_key_12345';

function log(msg) {
  const el = document.getElementById('log-output');
  const t = new Date().toLocaleTimeString();
  el.textContent += `[${t}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log-output').textContent = '';
  document.getElementById('tests-body').innerHTML = '';
}

async function apiCall(params, timeoutMs = 3000) {
  const url = new URL(API, location.href);
  url.searchParams.set('key', KEY);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const t0 = performance.now();
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    const text = await r.text();
    return { ok: r.ok, text, ms: Math.round(performance.now() - t0) };
  } catch(e) {
    clearTimeout(timer);
    return { ok: false, text: e.message, ms: Math.round(performance.now() - t0) };
  }
}

async function ping() {
  const badge = document.getElementById('ping-badge');
  try {
    const t0 = performance.now();
    const r = await fetch(API + '?ping=1', { signal: AbortSignal.timeout(2000) });
    const text = await r.text();
    const ms = Math.round(performance.now() - t0);
    if (text === 'PONG') {
      badge.className = 'badge bg-success';
      badge.textContent = `✅ Online ${ms}ms`;
    } else {
      badge.className = 'badge bg-warning';
      badge.textContent = '⚠️ Unexpected';
    }
  } catch(e) {
    badge.className = 'badge bg-danger';
    badge.textContent = '❌ Offline';
  }
}

const TESTS = [
  { name: 'ping',          sql: null,                         special: 'ping' },
  { name: 'SHOW TABLES',   sql: 'SHOW TABLES',                fmt: 'json' },
  { name: 'SELECT 1',      sql: 'SELECT 1 as val',            fmt: 'json' },
  { name: 'SELECT NOW()',  sql: 'SELECT NOW() as ts',         fmt: 'json' },
  { name: 'SHOW DATABASES',sql: 'SHOW DATABASES',             fmt: 'json' },
  { name: 'bad key',       sql: 'SELECT 1',                   badKey: true },
  { name: 'empty sql',     sql: '',                           fmt: 'json' },
];

function addRow(test, status, ms, result) {
  const tbody = document.getElementById('tests-body');
  const tr = document.createElement('tr');
  const statusHtml = status === 'ok'
    ? '<span class="badge bg-success">✅ OK</span>'
    : status === 'warn'
    ? '<span class="badge bg-warning text-dark">⚠️ warn</span>'
    : '<span class="badge bg-danger">❌ fail</span>';
  const short = result.length > 80 ? result.slice(0, 80) + '…' : result;
  tr.innerHTML = `
    <td>${test.name}</td>
    <td><code class="small">${test.sql || test.special || ''}</code></td>
    <td>${statusHtml}</td>
    <td><span class="badge bg-azure badge-ms">${ms}ms</span></td>
    <td><span class="text-muted small font-monospace">${short}</span></td>`;
  tbody.appendChild(tr);
}

async function runAllTests() {
  document.getElementById('tests-body').innerHTML = '';
  log('🚀 Запуск всех тестов...');

  for (const t of TESTS) {
    if (t.special === 'ping') {
      const t0 = performance.now();
      try {
        const r = await fetch(API + '?ping=1', { signal: AbortSignal.timeout(2000) });
        const text = await r.text();
        const ms = Math.round(performance.now() - t0);
        const ok = text === 'PONG';
        addRow(t, ok ? 'ok' : 'fail', ms, text);
        log(`${ok ? '✅' : '❌'} ping — ${ms}ms | ${text}`);
      } catch(e) {
        addRow(t, 'fail', 0, e.message);
        log(`❌ ping — ${e.message}`);
      }
      continue;
    }

    if (t.badKey) {
      const url = `${API}?key=WRONG&sql=${encodeURIComponent(t.sql)}&format=json`;
      const t0 = performance.now();
      const r = await fetch(url);
      const text = await r.text();
      const ms = Math.round(performance.now() - t0);
      const ok = r.status === 403;
      addRow(t, ok ? 'ok' : 'warn', ms, `HTTP ${r.status}: ${text}`);
      log(`${ok ? '✅' : '⚠️'} bad key — HTTP ${r.status}`);
      continue;
    }

    const res = await apiCall({ sql: t.sql, format: t.fmt || 'json' });
    let status = 'fail';
    let display = res.text;
    try {
      const j = JSON.parse(res.text);
      if (j.status === 'ok' || j.status === 'success' || Array.isArray(j.data) || j.data !== undefined) status = 'ok';
      else if (j.status === 'error' && !t.sql) status = 'warn'; // ожидаемая ошибка
      display = JSON.stringify(j, null, 2);
    } catch(e) {
      if (res.text.startsWith('ERROR:')) status = t.sql === '' ? 'warn' : 'fail';
      else status = 'ok';
    }
    addRow(t, status, res.ms, display);
    log(`${status === 'ok' ? '✅' : status === 'warn' ? '⚠️' : '❌'} ${t.name} — ${res.ms}ms`);
  }
  log('✅ Все тесты завершены');
}

async function runManual() {
  const sql = document.getElementById('sql-input').value.trim();
  const params = document.getElementById('params-input').value.trim();
  const format = document.getElementById('format-select').value;
  if (!sql) { log('⚠️ Введите SQL запрос'); return; }

  const p = { sql, format };
  if (params) p.params = params;
  const res = await apiCall(p);

  let output = res.text;
  if (format === 'json') {
    try { output = JSON.stringify(JSON.parse(res.text), null, 2); } catch(e) {}
  }

  document.getElementById('manual-result').style.display = '';
  document.getElementById('manual-output').textContent = output;
  document.getElementById('manual-time').textContent = `${res.ms}ms`;
  log(`🔧 Manual: ${sql.slice(0,50)} — ${res.ms}ms`);
}

// Инициализация
ping();
log('📡 MySQL API Test готов. Нажми "Запустить все" для тестов.');
</script>
</body>
</html>
