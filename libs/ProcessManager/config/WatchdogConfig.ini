[Watchdog]
DisableAutostart=0
LogCounter=97
WMIEnabled=1
WMIEventsMode=0
MinRestartInterval=1000
ProcessCheckInterval=3000
DuplicateCheckInterval=2000

[Optimization]
; 🎯 Настройки оптимизации CPU нагрузки (в миллисекундах)
MainLoopSleep=100
WMIEventsCheckInterval=500
WMIPollingInterval=1000
DuplicateCheckInterval=2000
WMIEventTimeout=500

[Logs]
LogFile=Watchdog.log
MaxEntries=500
MaxLogSize=2097152
ShowInclusions=1
ShowExclusions=1
ShowErrors=1
ShowConsole=1
ShowSystem=1
ShowOther=1
LogCounter=1
MaxDisplayEntries=30

[WMI]
EventsInterval=100
PollingInterval=100
MaxErrors=10
ReinitializeAfterErrors=3

[AutoIt]
ErrorLogFile=AutoitErrors.txt
MaxErrorEntries=500
[WMICleanup]
; 🧹 Настройки очистки WMI ресурсов (БЫСТРЫЙ ЗАПУСК)
PeriodicCheckInterval=600000
MaxWMIProcesses=8
WarningWMIProcesses=5
ForceCleanupOnStartup=1
FastStartup=1
WMIStabilizationDelay=1500
